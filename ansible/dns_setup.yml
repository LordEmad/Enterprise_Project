- name: DNS Managment
  hosts: all
  become: yes
  tasks:
    - name: Install packages
      dnf: 
        name:
          - bind 
          - bind-utils
        state: present

    - name: deploy the main config
      template:
        src: named.conf.j2
        dest: /etc/named.conf

    - name: deploy the zone file
      template:
        src: zone.db.j2
        dest: /var/named/your.zone.db
 

    - name: ensure dns is working
      service: 
        name: named
        state: started

    - name: open firewall
      firewalld: 
         port: 53/udp 
         state: enabled
         permanent: yes
         immediate: yes

    - name: open firewall tcp
      firewalld:
        port: 53/tcp
        state: enabled
        permanent: yes
        immediate: yes

